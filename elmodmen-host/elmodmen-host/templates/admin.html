<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#101418">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png?v=8">
<link rel="shortcut icon" href="/static/favicon.ico?v=8">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>الإدارة — BATMAN Dev</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#7af0b4;--on-primary:#003918;
  --primary-container:#005230;--on-primary-container:#a4f6c8;
  --secondary:#c2b6ff;--on-secondary:#2c1f6e;
  --secondary-container:#433786;--on-secondary-container:#e4dfff;
  --tertiary:#7fd2ff;--tertiary-container:#004a72;--on-tertiary-container:#c4e7ff;
  --error:#ffb4ab;--error-container:#93000a;--on-error-container:#ffdad6;
  --warning:#ffb868;--warning-container:#5a3d00;--on-warning-container:#ffddb4;
  --grouped:#101418;--surface:#101418;
  --s1:#171b1f;--s2:#1c2024;--s3:#1f2429;--s4:#222830;--s5:#272d35;
  --on-surface:#e1e3e7;--on-surface-v:#c1c7ce;--outline:#8b9198;--outline-v:#41474d;--scrim:rgba(0,0,0,.55);
  --label:var(--on-surface);--label-2:var(--on-surface-v);--label-3:rgba(193,199,206,.55);--label-4:rgba(193,199,206,.22);
  --separator:rgba(65,71,77,.6);--separator-strong:var(--outline-v);
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);--tab-h:80px;
  --el1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);
  --el2:0 1px 2px rgba(0,0,0,.3),0 2px 6px 2px rgba(0,0,0,.15);
  --el3:0 4px 8px 3px rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.3);
}
html[data-theme="light"]{
  --grouped:#fef7ff;--surface:#fef7ff;
  --s1:#f7f2fa;--s2:#f1ecf4;--s3:#ebe6ee;--s4:#e8e3eb;--s5:#e4dfe7;
  --on-surface:#1c1b1f;--on-surface-v:#49454f;--outline:#79747e;--outline-v:#cac4d0;
  --primary:#006d3d;--on-primary:#fff;--primary-container:#9bf6c3;--on-primary-container:#00210e;
  --secondary:#5e5891;--on-secondary:#fff;--secondary-container:#e4dfff;--on-secondary-container:#19134d;
  --tertiary:#0061a4;--tertiary-container:#cee5ff;--on-tertiary-container:#001d35;
  --error:#ba1a1a;--error-container:#ffdad6;--on-error-container:#410002;
  --warning:#825500;--warning-container:#ffddb4;--on-warning-container:#291800;
  --label:var(--on-surface);--label-2:var(--on-surface-v);--label-3:rgba(73,69,79,.5);--label-4:rgba(73,69,79,.2);
  --separator:rgba(202,196,208,.7);--separator-strong:var(--outline-v);--scrim:rgba(0,0,0,.4);
}
html,body{height:100%;overscroll-behavior-y:contain}
body{font-family:'Roboto','Tajawal',system-ui,sans-serif;background:var(--grouped);color:var(--label);min-height:100vh;
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.43;letter-spacing:.1px}
.app{padding:calc(var(--safe-top) + 8px) 0 calc(var(--tab-h) + var(--safe-bot) + 24px);max-width:680px;margin:0 auto}

.lt{padding:14px 20px 22px;background:var(--s1);margin:0 0 14px;border-radius:0 0 28px 28px;box-shadow:var(--el1);display:flex;align-items:center;justify-content:space-between;gap:12px}
.lt-body{flex:1;min-width:0}
.lt h1{font-size:24px;font-weight:500;letter-spacing:0;line-height:1.2}
.lt p{font-size:13px;color:var(--label-2);font-weight:400;margin-top:4px;display:flex;align-items:center;gap:7px;letter-spacing:.25px}
.lt p i{color:var(--secondary)}
.av-admin{width:44px;height:44px;border-radius:50%;background:var(--secondary-container);color:var(--on-secondary-container);display:grid;place-items:center;flex:none;font-size:16px;font-weight:500}

.sec-h{padding:16px 24px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sec-h .lbl{font-size:14px;font-weight:500;color:var(--label);letter-spacing:.1px;display:inline-flex;align-items:center;gap:8px}
.sec-h .lbl i{color:var(--label-2);font-size:13px}
.sec-h .act{font-size:14px;font-weight:500;color:var(--primary);cursor:pointer;background:none;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;min-height:36px;letter-spacing:.1px}
.sec-h .act:active{background:rgba(122,240,180,.12)}

.group{margin:0 12px;background:var(--s1);border-radius:20px;overflow:hidden;box-shadow:var(--el1)}

.row{display:flex;align-items:center;gap:14px;padding:14px 20px;min-height:64px;position:relative;background:none;border:none;width:100%;text-align:right;font-family:inherit;transition:background .15s}
.row + .row::before{content:"";position:absolute;top:0;right:74px;left:20px;height:1px;background:var(--separator)}
.row .ric{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:15px;color:#fff;flex:none;font-weight:500}
.row .rbody{flex:1;min-width:0}
.row .rtitle{font-size:16px;font-weight:500;color:var(--label);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;display:flex;align-items:center;gap:6px;letter-spacing:.1px}
.row .rsub{font-size:13px;color:var(--label-2);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;letter-spacing:.2px}
.row .racts{display:flex;gap:6px;flex:none}
.row .racts button{width:40px;height:40px;border-radius:50%;border:none;background:var(--s3);color:var(--label);font-size:14px;cursor:pointer;font-family:inherit;display:grid;place-items:center;transition:.15s}
.row .racts button:active{transform:scale(.9);background:var(--s4)}
.row .racts .ok{background:var(--primary-container);color:var(--on-primary-container)}
.row .racts .no{background:var(--error-container);color:var(--on-error-container)}
.row .racts .ac{background:var(--secondary-container);color:var(--on-secondary-container)}

.metric{display:flex;align-items:center;gap:14px;padding:14px 20px;min-height:66px;position:relative}
.metric + .metric::before{content:"";position:absolute;top:0;right:74px;left:20px;height:1px;background:var(--separator)}
.metric .ric{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:15px;color:var(--on-primary);flex:none}
.metric .mbody{flex:1;min-width:0}
.metric .mtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.metric .mtitle{font-size:15px;font-weight:500;color:var(--label);letter-spacing:.1px}
.metric .mval{font-size:13px;color:var(--label-2);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.2px}
.metric .pbar{height:8px;border-radius:99px;background:var(--s4);overflow:hidden}
.metric .pbar i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,0,0,1)}
.metric.cpu .ric{background:var(--secondary-container);color:var(--on-secondary-container)}
.metric.cpu .pbar i{background:var(--secondary)}
.metric.mem .ric{background:var(--primary-container);color:var(--on-primary-container)}
.metric.mem .pbar i{background:var(--primary)}
.metric.disk .ric{background:var(--tertiary-container);color:var(--on-tertiary-container)}
.metric.disk .pbar i{background:var(--tertiary)}

.stats-hero{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
.shero{background:var(--s1);border-radius:20px;padding:18px;box-shadow:var(--el1)}
.shero .l{font-size:12px;color:var(--label-2);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px;letter-spacing:.4px}
.shero .l i{color:var(--label-3);font-size:13px}
.shero .v{font-size:30px;font-weight:500;letter-spacing:-.5px;line-height:1.05}
.shero.users .v{color:var(--secondary)}
.shero.pending .v{color:var(--warning)}

.chart-card{margin:0 12px;background:var(--s1);border-radius:20px;padding:18px;box-shadow:var(--el1)}
.chart-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.chart-h h3{font-size:14px;font-weight:500;letter-spacing:.1px}
.chart-h .leg{display:flex;gap:12px;font-size:11px;font-weight:500;color:var(--label-2);letter-spacing:.4px}
.chart-h .leg span{display:flex;align-items:center;gap:6px}
.chart-h .leg span i{width:10px;height:10px;border-radius:3px;display:inline-block}
#resChart{width:100%;height:170px;display:block}

.empty{margin:0 12px;padding:34px 18px;background:var(--s1);border-radius:20px;text-align:center;color:var(--label-2);box-shadow:var(--el1)}
.empty i{font-size:38px;color:var(--label-3);margin-bottom:13px;display:block}
.empty h4{font-size:16px;font-weight:500;color:var(--label);margin-bottom:5px;letter-spacing:0}
.empty p{font-size:13px;font-weight:400;letter-spacing:.2px}

.tag{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;letter-spacing:.3px}
.tag.app{background:var(--primary-container);color:var(--on-primary-container)}
.tag.pen{background:var(--warning-container);color:var(--on-warning-container)}
.tag.rej{background:var(--error-container);color:var(--on-error-container)}
.tag.adm{background:var(--secondary-container);color:var(--on-secondary-container)}

.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);left:16px;z-index:55;width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;font-size:22px;background:var(--secondary-container);color:var(--on-secondary-container);display:grid;place-items:center;box-shadow:var(--el3);transition:.2s}
.fab:active{transform:scale(.94);box-shadow:var(--el2)}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--s2);border-top:1px solid var(--outline-v);padding:12px 8px calc(16px + var(--safe-bot));display:flex;align-items:flex-start;justify-content:space-around;height:calc(var(--tab-h) + var(--safe-bot))}
.tabbar button,.tabbar a{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--label-2);font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit;padding:0;flex:1;min-width:0;min-height:48px;text-decoration:none;letter-spacing:.4px;transition:color .18s}
.tabbar .pill{display:grid;place-items:center;width:64px;height:32px;border-radius:16px;transition:background .25s cubic-bezier(.2,0,0,1)}
.tabbar i{font-size:20px}
.tabbar .active{color:var(--on-secondary-container)}
.tabbar .active .pill{background:var(--secondary-container)}
.tabbar .active i{color:var(--on-secondary-container)}

.modal{position:fixed;inset:0;z-index:200;background:var(--scrim);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:680px;max-height:92vh;max-height:92dvh;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--s2);border-radius:28px 28px 0 0;padding:0 0 calc(24px + var(--safe-bot));animation:slideUp .3s cubic-bezier(.2,0,0,1);position:relative;box-shadow:var(--el3)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet::before{content:"";position:sticky;top:0;display:block;margin:14px auto 0;width:32px;height:4px;background:var(--outline);border-radius:99px;opacity:.5}
.sheet-h{padding:14px 22px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:18px;background:var(--s2);z-index:5}
.sheet-h h3{font-size:22px;font-weight:500;letter-spacing:0}
.sheet-h .x{font-family:inherit;font-weight:500;font-size:14px;color:var(--primary);background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:99px;min-height:36px;letter-spacing:.1px}
.sheet-h .x:active{background:rgba(122,240,180,.12)}

.field{display:flex;align-items:center;gap:14px;padding:16px 22px;min-height:58px;position:relative}
.field + .field::before{content:"";position:absolute;top:0;right:22px;left:22px;height:1px;background:var(--separator)}
.field label{font-size:14px;font-weight:500;color:var(--label-2);min-width:115px;flex:none;letter-spacing:.1px}
.field input,.field select{flex:1;border:none;background:none;color:var(--label);font-family:inherit;font-size:16px;outline:none;text-align:right;min-height:32px;padding:0;font-weight:400;letter-spacing:.25px}
.field input::placeholder{color:var(--label-3)}
.field-col{flex-direction:column;align-items:stretch;gap:6px;padding:14px 22px}
.field-col label{min-width:0;font-size:12px;font-weight:500;color:var(--label-2);letter-spacing:.4px}
.field-col input,.field-col select{font-size:16px;text-align:right}

.btn{cursor:pointer;border:none;font-family:inherit;font-weight:500;font-size:14px;border-radius:99px;padding:0 24px;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--on-primary);height:40px;transition:.18s;letter-spacing:.1px;box-shadow:var(--el1)}
.btn:active{transform:scale(.97);box-shadow:var(--el2)}
.btn-block{width:calc(100% - 32px);margin:18px 16px;height:48px;font-size:15px}
.btn-primary{background:var(--primary);color:var(--on-primary)}
.btn-accent{background:var(--secondary-container);color:var(--on-secondary-container);box-shadow:none}

.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 20px);left:16px;right:16px;margin:0 auto;max-width:520px;transform:translateY(140px);opacity:0;z-index:500;background:var(--s5);color:var(--label);border-radius:8px;padding:14px 18px;font-weight:500;font-size:14px;box-shadow:var(--el3);display:flex;align-items:center;gap:10px;transition:.3s cubic-bezier(.2,0,0,1);letter-spacing:.25px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok i{color:var(--primary)}
.toast.bad i{color:var(--error)}

@media (min-width:768px){
  body{font-size:14px}
  .app{padding-bottom:24px}
  .lt{margin:14px;border-radius:24px}
  .tabbar{display:none}
  .fab{display:none}
  .modal{align-items:center;padding:30px}
  .sheet{border-radius:28px;max-width:680px;max-height:90vh}
  .sheet::before{display:none}
  .sheet-h{top:0}
  .toast{bottom:24px}
}
</style>
</head>
<body>

<div class="app">

  <header class="lt">
    <div class="lt-body">
      <h1>لوحة الأدمن</h1>
      <p><i class="fas fa-user-shield"></i> <span id="adminName">…</span></p>
    </div>
    <div class="av-admin"><i class="fas fa-crown"></i></div>
  </header>

  <div class="stats-hero">
    <div class="shero users"><div class="l"><i class="fas fa-users"></i> المستخدمون</div><div class="v" id="stUsers">0</div></div>
    <div class="shero pending"><div class="l"><i class="fas fa-clock"></i> طلبات معلقة</div><div class="v" id="stPending">0</div></div>
  </div>

  <div class="sec-h"><span class="lbl"><i class="fas fa-tower-broadcast"></i> أداء الخادم</span></div>
  <div class="group">
    <div class="metric cpu"><div class="ric"><i class="fas fa-microchip"></i></div><div class="mbody"><div class="mtop"><span class="mtitle">CPU</span><span class="mval" id="gCpu">0%</span></div><div class="pbar"><i id="ringCpu" style="width:0%"></i></div></div></div>
    <div class="metric mem"><div class="ric"><i class="fas fa-memory"></i></div><div class="mbody"><div class="mtop"><span class="mtitle">RAM</span><span class="mval" id="gMem">0%</span></div><div class="pbar"><i id="ringMem" style="width:0%"></i></div></div></div>
    <div class="metric disk"><div class="ric"><i class="fas fa-database"></i></div><div class="mbody"><div class="mtop"><span class="mtitle">القرص</span><span class="mval" id="gDisk">0%</span></div><div class="pbar"><i id="ringDisk" style="width:0%"></i></div></div></div>
  </div>
  <span id="lblCpu" style="display:none"></span><span id="lblMem" style="display:none"></span>

  <div class="sec-h"><span class="lbl"><i class="fas fa-chart-area"></i> رسم الأداء</span></div>
  <div class="chart-card">
    <div class="chart-h">
      <h3>آخر 60 ثانية</h3>
      <div class="leg"><span><i style="background:var(--secondary)"></i> CPU</span><span><i style="background:var(--primary)"></i> RAM</span></div>
    </div>
    <canvas id="resChart"></canvas>
  </div>

  <div class="sec-h"><span class="lbl"><i class="fas fa-credit-card"></i> مدفوعات معلقة</span></div>
  <div id="pendingList"></div>

  <div class="sec-h"><span class="lbl"><i class="fas fa-receipt"></i> السجل</span></div>
  <div id="paymentsList"></div>

  <div class="sec-h"><span class="lbl"><i class="fas fa-users-gear"></i> المستخدمون</span><button class="act" onclick="openCreate()"><i class="fas fa-plus"></i> جديد</button></div>
  <div id="usersBody"></div>

  <div class="sec-h"><span class="lbl"><i class="fas fa-gem"></i> الخطط</span><button class="act" onclick="openPlan()"><i class="fas fa-plus"></i> خطة</button></div>
  <div id="plansList"></div>

</div>

<button class="fab" onclick="openCreate()" aria-label="إضافة مستخدم"><i class="fas fa-user-plus"></i></button>

<nav class="tabbar">
  <button class="active"><div class="pill"><i class="fas fa-gauge-high"></i></div><span>لوحة</span></button>
  <button onclick="document.querySelector('#usersBody').scrollIntoView({behavior:'smooth',block:'start'})"><div class="pill"><i class="fas fa-users"></i></div><span>مستخدمين</span></button>
  <button onclick="document.querySelector('#pendingList').scrollIntoView({behavior:'smooth',block:'start'})"><div class="pill"><i class="fas fa-credit-card"></i></div><span>دفع</span></button>
  <button onclick="document.querySelector('#plansList').scrollIntoView({behavior:'smooth',block:'start'})"><div class="pill"><i class="fas fa-gem"></i></div><span>خطط</span></button>
  <a href="/dashboard"><div class="pill"><i class="fas fa-arrow-right-from-bracket"></i></div><span>خروج</span></a>
</nav>

<div class="modal" id="mCreate"><div class="sheet"><div class="sheet-h"><h3>مستخدم جديد</h3><button class="x" onclick="closeM('mCreate')">إلغاء</button></div><div class="sec-h"><span class="lbl">بيانات الدخول</span></div><div class="group"><div class="field"><label>اسم المستخدم</label><input id="nuUser" autocapitalize="off" spellcheck="false"></div><div class="field"><label>كلمة المرور</label><input id="nuPass" type="password"></div></div><div class="sec-h"><span class="lbl">الحصص</span></div><div class="group"><div class="field"><label>عدد البوتات</label><input id="nuServers" type="number" value="1" min="1" inputmode="numeric"></div><div class="field"><label>التخزين (MB)</label><input id="nuStorage" type="number" value="100" min="10" inputmode="numeric"></div></div><button class="btn btn-primary btn-block" onclick="createUser()"><i class="fas fa-check"></i> إنشاء</button></div></div>

<div class="modal" id="mEdit"><div class="sheet"><div class="sheet-h"><h3 id="edTitle">تعديل</h3><button class="x" onclick="closeM('mEdit')">إلغاء</button></div><div class="sec-h"><span class="lbl">الحصص</span></div><div class="group"><div class="field"><label>عدد البوتات</label><input id="edServers" type="number" inputmode="numeric"></div><div class="field"><label>التخزين (MB)</label><input id="edStorage" type="number" inputmode="numeric"></div><div class="field"><label>الخطة</label><select id="edPlan"><option value="free">Free</option><option value="basic">Basic</option><option value="pro">Pro</option><option value="premium">Premium</option></select></div></div><button class="btn btn-primary btn-block" onclick="saveUser()"><i class="fas fa-floppy-disk"></i> حفظ</button></div></div>

<div class="modal" id="mPlan"><div class="sheet"><div class="sheet-h"><h3>خطة</h3><button class="x" onclick="closeM('mPlan')">إلغاء</button></div><div class="sec-h"><span class="lbl">تفاصيل</span></div><div class="group"><div class="field"><label>المعرف</label><input id="plId" placeholder="basic" autocapitalize="off" spellcheck="false"></div><div class="field"><label>الاسم</label><input id="plName"></div><div class="field"><label>السعر ($)</label><input id="plPrice" type="number" inputmode="decimal"></div><div class="field"><label>بوتات</label><input id="plServers" type="number" inputmode="numeric"></div><div class="field"><label>تخزين (MB)</label><input id="plStorage" type="number" inputmode="numeric"></div><div class="field"><label>RAM (MB)</label><input id="plRam" type="number" inputmode="numeric"></div><div class="field"><label>CPU</label><input id="plCpu" type="number" inputmode="numeric"></div></div><button class="btn btn-primary btn-block" onclick="addPlan()"><i class="fas fa-check"></i> حفظ</button></div></div>

<div class="toast" id="toast"><i class="fas fa-circle-check"></i><span id="toastMsg"></span></div>

<script>
let USERS=[],PLANS={},EDIT=null,RES_CHART=null;
const $=id=>document.getElementById(id);
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function api(url,opt){try{const r=await fetch(url,opt);return await r.json();}catch(e){return{success:false,message:'خطأ اتصال'};}}
function toast(msg,ok){if(ok===undefined)ok=true;const t=$('toast');$('toastMsg').textContent=msg;t.className='toast show '+(ok?'ok':'bad');t.querySelector('i').className=ok?'fas fa-circle-check':'fas fa-circle-exclamation';setTimeout(()=>t.className='toast',2600);}
function closeM(id){$(id).classList.remove('open');}
async function logout(){await fetch('/api/logout',{method:'POST'});location.href='/admin/login';}
function ini(s){return (s||'?').charAt(0).toUpperCase();}

async function loadAll(){const d=await api('/api/current_user');if(!d.success||!d.is_admin){location.href='/admin/login';return;}$('adminName').textContent=d.username;await loadPlans();await loadUsers();await loadPending();await loadPayments();}

async function loadPlans(){const d=await api('/api/plans');PLANS=d.plans||{};const sel=$('edPlan');sel.innerHTML='';Object.entries(PLANS).forEach(([k,p])=>{const o=document.createElement('option');o.value=k;o.textContent=p.name||k;sel.appendChild(o);});const el=$('plansList');if(!Object.keys(PLANS).length){el.innerHTML='<div class="empty"><i class="fas fa-gem"></i><h4>لا توجد خطط</h4></div>';return;}el.innerHTML='<div class="group">'+Object.entries(PLANS).map(([k,p])=>`<div class="row"><div class="ric" style="background:var(--secondary-container);color:var(--on-secondary-container)"><i class="fas fa-gem"></i></div><div class="rbody"><div class="rtitle">${esc(p.name||k)}</div><div class="rsub">$${p.price||0}/شهر • ${p.max_servers||1} بوت • ${p.storage||0}MB</div></div></div>`).join('')+'</div>';}

async function loadUsers(){const d=await api('/api/admin/users');USERS=d.users||[];$('stUsers').textContent=USERS.length;const el=$('usersBody');if(!USERS.length){el.innerHTML='<div class="empty"><i class="fas fa-users-slash"></i><h4>لا يوجد مستخدمون</h4></div>';return;}el.innerHTML='<div class="group">'+USERS.map(u=>`<div class="row"><div class="ric" style="background:var(--primary-container);color:var(--on-primary-container)">${esc(ini(u.username))}</div><div class="rbody"><div class="rtitle">${esc(u.username)}${u.is_admin?' <span class="tag adm"><i class="fas fa-crown"></i> أدمن</span>':''}</div><div class="rsub">${esc(u.plan||'free')} • ${u.max_servers||0} بوت • ${u.storage_limit||0}MB</div></div><div class="racts"><button class="ac" onclick="editUser('${esc(u.username)}')" title="تعديل"><i class="fas fa-pen"></i></button>${u.is_admin?'':`<button class="no" onclick="delUser('${esc(u.username)}')" title="حذف"><i class="fas fa-trash"></i></button>`}</div></div>`).join('')+'</div>';}

async function loadPending(){const d=await api('/api/admin/payments?status=pending');const list=d.payments||[];$('stPending').textContent=list.length;const el=$('pendingList');if(!list.length){el.innerHTML='<div class="empty"><i class="fas fa-check-circle"></i><h4>لا توجد طلبات</h4><p>كل الطلبات تمت مراجعتها</p></div>';return;}el.innerHTML='<div class="group">'+list.map(p=>`<div class="row"><div class="ric" style="background:var(--warning-container);color:var(--on-warning-container)"><i class="fas fa-clock"></i></div><div class="rbody"><div class="rtitle">${esc(p.username)} → ${esc(p.plan)}</div><div class="rsub">$${p.amount||0} • ${esc(p.note||'—')}</div></div><div class="racts"><button class="ok" onclick="payAction(${p.id},'approve')" title="موافقة"><i class="fas fa-check"></i></button><button class="no" onclick="payAction(${p.id},'reject')" title="رفض"><i class="fas fa-xmark"></i></button></div></div>`).join('')+'</div>';}

async function loadPayments(){const d=await api('/api/admin/payments');const list=(d.payments||[]).filter(p=>p.status!=='pending').slice(0,10);const el=$('paymentsList');if(!list.length){el.innerHTML='<div class="empty" style="padding:22px"><i class="fas fa-receipt"></i><p>لا يوجد سجل</p></div>';return;}el.innerHTML='<div class="group">'+list.map(p=>{const st=p.status==='approved'?'app':'rej';const ic=p.status==='approved'?'fa-circle-check':'fa-circle-xmark';const bg=p.status==='approved'?'primary-container':'error-container';const fg=p.status==='approved'?'on-primary-container':'on-error-container';return `<div class="row"><div class="ric" style="background:var(--${bg});color:var(--${fg})"><i class="fas ${ic}"></i></div><div class="rbody"><div class="rtitle">${esc(p.username)} <span class="tag ${st}">${p.status==='approved'?'موافق':'مرفوض'}</span></div><div class="rsub">${esc(p.plan)} • $${p.amount||0}</div></div></div>`;}).join('')+'</div>';}

async function payAction(id,a){const d=await api('/api/admin/payment/'+id+'/'+a,{method:'POST'});toast(d.message,d.success);loadPending();loadPayments();loadUsers();}
async function approve(id){return payAction(id,'approve');}
async function reject(id){return payAction(id,'reject');}

function openCreate(){$('nuUser').value='';$('nuPass').value='';$('nuServers').value=1;$('nuStorage').value=100;$('mCreate').classList.add('open');}
async function createUser(){const u=$('nuUser').value.trim(),p=$('nuPass').value;if(!u||!p)return toast('أكمل الحقول',false);const d=await api('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,max_servers:+$('nuServers').value,storage_limit:+$('nuStorage').value})});toast(d.message,d.success);if(d.success){closeM('mCreate');loadUsers();}}
function editUser(name){const u=USERS.find(x=>x.username===name);if(!u)return;EDIT=name;$('edTitle').textContent='تعديل — '+name;$('edServers').value=u.max_servers||1;$('edStorage').value=u.storage_limit||100;$('edPlan').value=u.plan||'free';$('mEdit').classList.add('open');}
async function saveUser(){if(!EDIT)return;const d=await api('/api/admin/users/'+encodeURIComponent(EDIT),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({max_servers:+$('edServers').value,storage_limit:+$('edStorage').value,plan:$('edPlan').value})});toast(d.message,d.success);if(d.success){closeM('mEdit');loadUsers();}}
async function delUser(name){if(!confirm('حذف '+name+'؟'))return;const d=await api('/api/admin/users/'+encodeURIComponent(name),{method:'DELETE'});toast(d.message,d.success);loadUsers();}

function openPlan(){$('plId').value='';$('plName').value='';$('plPrice').value=0;$('plServers').value=1;$('plStorage').value=100;$('plRam').value=256;$('plCpu').value=1;$('mPlan').classList.add('open');}
async function addPlan(){const id=$('plId').value.trim();if(!id)return toast('المعرف مطلوب',false);const d=await api('/api/admin/plans',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,name:$('plName').value,price:+$('plPrice').value,max_servers:+$('plServers').value,storage:+$('plStorage').value,ram:+$('plRam').value,cpu:+$('plCpu').value})});toast(d.message,d.success);if(d.success){closeM('mPlan');loadPlans();}}

function setGauge(id,pct){pct=Math.max(0,Math.min(100,Number(pct)||0));const el=$('ring'+id);if(el)el.style.width=pct+'%';const v=$('g'+id);if(v)v.textContent=Math.round(pct)+'%';}
async function loadMetrics(){const d=await api('/api/system/metrics');setGauge('Cpu',d.cpu||0);setGauge('Mem',d.memory||0);setGauge('Disk',d.disk||0);const h=await api('/api/system/history');drawChart(h.history||[]);}
function drawChart(hist){const ctx=$('resChart').getContext('2d');if(RES_CHART){RES_CHART.destroy();RES_CHART=null;}const lbl=hist.map(h=>h.t||'');const cp=hist.map(h=>h.cpu||0);const mm=hist.map(h=>h.memory||0);RES_CHART=new Chart(ctx,{type:'line',data:{labels:lbl,datasets:[{label:'CPU%',data:cp,borderColor:'#c2b6ff',backgroundColor:'rgba(194,182,255,.15)',fill:true,tension:.4,borderWidth:2,pointRadius:0},{label:'RAM%',data:mm,borderColor:'#7af0b4',backgroundColor:'rgba(122,240,180,.12)',fill:true,tension:.4,borderWidth:2,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'rgba(193,199,206,.32)',font:{size:10}},grid:{display:false}},y:{ticks:{color:'rgba(193,199,206,.32)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}}}});}

(function(){var s=localStorage.getItem('bm_theme')||'dark';document.documentElement.setAttribute('data-theme',s);const mc=document.querySelector('meta[name="theme-color"]');if(mc)mc.setAttribute('content',s==='light'?'#fef7ff':'#101418');})();
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
(async function(){await loadAll();loadMetrics();setInterval(loadMetrics,5000);setInterval(loadPending,15000);})();
</script>
</body>
</html>
